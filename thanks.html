<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease;
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.7;
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #3b82f6;
            color: white;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #2563eb;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .success-card {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="icon">✓</div>

        <h1>Message Sent Successfully!</h1>

        <p>
            Thank you for reaching out. I've received your message and will get back
            to you as soon as possible. I appreciate your interest and look forward
            to connecting with you.
        </p>

        <a href="/" class="btn">
            Back to Portfolio
        </a>
    </div>

</body>

</html>
